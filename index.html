    <script>
      // Kick off the daily-problem fetch in parallel with the JS bundle
      // download. fetchDaily() in src/services/api.ts consumes this promise,
      // so by the time React has booted the response is usually already here.
      (function () {
        var d = new Date();
        var date =
          d.getFullYear() + '-' +
          String(d.getMonth() + 1).padStart(2, '0') + '-' +
          String(d.getDate()).padStart(2, '0');
        window.__dailyPreloadDate = date;
        window.__dailyPreload = fetch('/api/daily?date=' + date).catch(function () { return null; });
      })();
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
